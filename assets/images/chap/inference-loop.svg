<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Hur en sprakmodell svarar</title>
  <desc id="desc">En fraga skickas in, modellen anvander sina vikter, bygger upp svaret steg for steg och skickar tillbaka ett svar.</desc>
  <style>
    .bg { fill: #f6f3ea; }
    .title { font: 700 32px Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 18; ry: 18; }
    .step { font: 700 18px Arial, sans-serif; fill: #9a3412; }
    .body { font: 400 22px Arial, sans-serif; fill: #111827; }
    .small { font: 400 18px Arial, sans-serif; fill: #374151; }
    .arrow { stroke: #374151; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="430"/>
  <text class="title" x="60" y="55">Hur en sprakmodell bygger upp ett svar</text>
  <text class="subtitle" x="60" y="88">Fraga in -> anvand vikterna -> bygg svaret steg for steg -> svar ut</text>

  <rect class="box" x="60" y="130" width="235" height="150"/>
  <text class="step" x="85" y="165">1. Fraga in</text>
  <text class="body" x="85" y="205">"Vad ar en agent?"</text>

  <rect class="box" x="340" y="130" width="245" height="150"/>
  <text class="step" x="365" y="165">2. Anvand vikterna</text>
  <text class="small" x="365" y="205">Modellen raknar ut</text>
  <text class="small" x="365" y="232">vad som mest sannolikt</text>
  <text class="small" x="365" y="259">kommer harnast.</text>

  <rect class="box" x="630" y="130" width="245" height="150"/>
  <text class="step" x="655" y="165">3. Bygg svaret</text>
  <text class="body" x="655" y="205">"En agent ..."</text>
  <text class="small" x="655" y="235">ord for ord, steg for steg</text>

  <rect class="box" x="920" y="130" width="220" height="150"/>
  <text class="step" x="945" y="165">4. Svar ut</text>
  <text class="body" x="945" y="215">Fardigt svar</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M 295 205 L 340 205"/>
  <path class="arrow" marker-end="url(#arrowhead)" d="M 585 205 L 630 205"/>
  <path class="arrow" marker-end="url(#arrowhead)" d="M 875 205 L 920 205"/>
</svg>
