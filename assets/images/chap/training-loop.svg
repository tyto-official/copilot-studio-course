<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Hur en sprakmodell tranas</title>
  <desc id="desc">Text gar in, modellen gissar, gissningen jamfors med facit, vikterna justeras och processen upprepas.</desc>
  <style>
    .bg { fill: #f6f3ea; }
    .title { font: 700 32px Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 18; ry: 18; }
    .step { font: 700 18px Arial, sans-serif; fill: #9a3412; }
    .body { font: 400 22px Arial, sans-serif; fill: #111827; }
    .small { font: 400 18px Arial, sans-serif; fill: #374151; }
    .arrow { stroke: #374151; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .loop { stroke: #b45309; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .label { font: 700 16px Arial, sans-serif; fill: #b45309; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="loophead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="430"/>
  <text class="title" x="60" y="55">Hur en sprakmodell tranar sina vikter</text>
  <text class="subtitle" x="60" y="88">Text in -> gissning -> facit -> justera vikter -> upprepa</text>

  <rect class="box" x="60" y="130" width="235" height="150"/>
  <text class="step" x="85" y="165">1. Text in</text>
  <text class="body" x="85" y="205">"Jag dricker kaffe</text>
  <text class="body" x="85" y="235">till ..."</text>

  <rect class="box" x="340" y="130" width="235" height="150"/>
  <text class="step" x="365" y="165">2. Modellen gissar</text>
  <text class="body" x="365" y="205">frukost</text>
  <text class="small" x="365" y="235">middag / hund / jobbet</text>

  <rect class="box" x="620" y="130" width="215" height="150"/>
  <text class="step" x="645" y="165">3. Facit</text>
  <text class="body" x="645" y="215">frukost</text>

  <rect class="box" x="880" y="130" width="255" height="150"/>
  <text class="step" x="905" y="165">4. Justera vikter</text>
  <text class="small" x="905" y="205">Gissningen var fel.</text>
  <text class="small" x="905" y="232">Andra pa rattarna lite</text>
  <text class="small" x="905" y="259">sa att nasta forsok blir battre.</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M 295 205 L 340 205"/>
  <path class="arrow" marker-end="url(#arrowhead)" d="M 575 205 L 620 205"/>
  <path class="arrow" marker-end="url(#arrowhead)" d="M 835 205 L 880 205"/>

  <path class="loop" marker-end="url(#loophead)" d="M 1008 290 C 1008 355, 710 385, 375 385 C 185 385, 120 350, 120 290"/>
  <text class="label" x="490" y="410">Upprepa pa enorma mangder text</text>
</svg>
