<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">Förenklad intuition för hur en vikt påverkar ett resultat</title>
  <desc id="desc">En enkel ekvation visar att vikten styr hur starkt en signal påverkar poängen för ett ord som frukost.</desc>
  <style>
    .bg { fill: #f6f3ea; }
    .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 18; ry: 18; }
    .eq { font: 700 34px Arial, sans-serif; fill: #111827; }
    .body { font: 400 22px Arial, sans-serif; fill: #111827; }
    .small { font: 400 18px Arial, sans-serif; fill: #374151; }
    .label { font: 700 18px Arial, sans-serif; fill: #9a3412; }
    .accent { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
    .arrow { stroke: #374151; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="470"/>
  <text class="title" x="60" y="55">En enkel intuition för vad en vikt gör</text>
  <text class="subtitle" x="60" y="86">Detta är starkt förenklat, men visar att vikten styr hur mycket en inputsignal får påverka resultatet.</text>

  <rect class="box" x="60" y="125" width="520" height="275"/>
  <text class="label" x="90" y="165">Förenklad ekvation</text>
  <text class="eq" x="90" y="215">y = w * x</text>
  <text class="small" x="90" y="260">x = inputsignal, till exempel texten "Jag dricker kaffe till"</text>
  <text class="small" x="90" y="292">w = vikten som justeras under träningen</text>
  <text class="small" x="90" y="324">y = output, alltså modellens poäng för ett möjligt ord</text>

  <rect class="accent" x="640" y="125" width="500" height="275"/>
  <text class="label" x="670" y="165">Exempel: ordet "frukost"</text>
  <text class="small" x="670" y="210">Om vikten är för låg:</text>
  <text class="body" x="670" y="245">y = 0.2 * 10 = 2</text>
  <text class="small" x="670" y="282">2 är en låg poäng för ordet "frukost".</text>
  <text class="small" x="670" y="320">Om vikten justeras upp:</text>
  <text class="body" x="670" y="355">y = 0.8 * 10 = 8</text>
  <text class="small" x="670" y="388">8 är en högre poäng för ordet "frukost".</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M 580 242 L 640 242"/>
</svg>
